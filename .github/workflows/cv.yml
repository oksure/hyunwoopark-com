name: CV Build

# Compiles the CV from cv/*.Rmd with the custom class/preamble (same pipeline
# as gpu ~/cv-build), runs a style gate that fails on "generic pandoc article"
# regressions, and uploads the PDF to the DigitalOcean Spaces object the site
# links to. The site itself is untouched — only the linked PDF updates.
on:
  push:
    branches: [master]
    paths: ['cv/**']
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload to DO Spaces after gate passes'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (R, pandoc, TeX Live, poppler)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends \
            pandoc r-base r-cran-rmarkdown r-cran-knitr \
            texlive-latex-base texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra \
            texlive-pictures texlive-plain-generic lmodern \
            poppler-utils python3-pil
          Rscript -e 'if (!requireNamespace("fontawesome", quietly=TRUE)) install.packages("fontawesome", repos="https://packagemanager.posit.co/cran/__linux__/noble/latest")'

      - name: Generate sections from src/data + build CV
        # Single source of truth: pubs/procs entries come from src/data/*.json
        # (cvSelected: true), spliced into cv/CV_template.Rmd. Other sections
        # are edited directly in the template.
        run: |
          python3 cv/generate_cv_sections.py
          bash cv/build.sh CV_Hyunwoo_Park_gen

      - name: Style gate (fail loudly on generic-article regressions)
        run: python3 cv/check_style.py cv/CV_Hyunwoo_Park.pdf

      - name: Render preview pages for the artifact
        run: |
          pdftoppm -png -f 1 -l 3 -r 100 cv/CV_Hyunwoo_Park.pdf cv/preview
          pdfinfo cv/CV_Hyunwoo_Park.pdf

      - uses: actions/upload-artifact@v4
        with:
          name: cv-pdf-and-previews
          path: |
            cv/CV_Hyunwoo_Park.pdf
            cv/preview*.png
          retention-days: 30

      - name: Upload to DO Spaces (backup first)
        # First CI build verified 0-pixel-identical to the gpu reference
        # across all 8 pages (2026-07-03) — auto-upload enabled on push.
        if: github.event_name == 'push' || inputs.upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          AWS_DEFAULT_REGION: sfo3
          # aws cli v2.23+/boto 1.36+ send flexible-checksum headers by default,
          # which third-party S3 (DO Spaces) rejects/crashes on — official mitigation:
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          EP: https://sfo3.digitaloceanspaces.com
        run: |
          TS=$(date -u +%Y%m%d_%H%M)
          # dated backup of the live object before overwriting. get+put, NOT
          # copy-object: DO Spaces crashes aws cli's copy-object ("NoneType is
          # not iterable") — verified 2026-07-03, put/get work fine.
          aws s3api get-object --endpoint-url "$EP" --bucket zzz \
            --key "y/CV Hyunwoo Park.pdf" /tmp/cv_live_backup.pdf
          aws s3api put-object --endpoint-url "$EP" --bucket zzz \
            --key "y/cv-backups/CV_backup_${TS}.pdf" --body /tmp/cv_live_backup.pdf \
            --acl private --content-type application/pdf
          aws s3api put-object --endpoint-url "$EP" --bucket zzz \
            --key "y/CV Hyunwoo Park.pdf" --body cv/CV_Hyunwoo_Park.pdf \
            --acl public-read --content-type application/pdf \
            --cache-control "public, max-age=300"
          echo "uploaded; note: the CDN edge may serve the previous version until its TTL expires"
